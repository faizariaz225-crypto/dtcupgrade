services:
  - type: web
    name: dtc-admin
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_KEY
        generateValue: true
    disk:
      name: dtc-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
