<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — DTC Customer Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0f4ff;--white:#fff;--blue:#2563eb;--blue-dark:#1d4ed8;--blue-light:#eff6ff;--blue-mid:#dbeafe;
      --border:#e2e8f0;--text:#1e293b;--muted:#64748b;--muted2:#94a3b8;
      --success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;
      --error:#dc2626;--error-bg:#fef2f2;--error-border:#fecaca;
      --warn:#d97706;--warn-bg:#fffbeb;--warn-border:#fde68a;
      --gpt:#10a37f;--gpt-bg:#f0faf7;--gpt-border:#a7f3d0;--gpt-dark:#059669;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(37,99,235,.06);
      --shadow-lg:0 4px 24px rgba(37,99,235,.12),0 1px 4px rgba(0,0,0,.06);
    }
    body{
      font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
      padding:0 0 5rem;
      background-image:
        radial-gradient(ellipse at 20% 0%,rgba(37,99,235,.07) 0%,transparent 50%),
        radial-gradient(ellipse at 80% 100%,rgba(99,102,241,.05) 0%,transparent 50%);
    }

    /* Header */
    .header{
      background:var(--white);border-bottom:1px solid var(--border);
      padding:1.2rem 0;margin-bottom:2rem;box-shadow:var(--shadow);
    }
    .header-inner{
      max-width:920px;margin:0 auto;padding:0 1.5rem;
      display:flex;align-items:center;justify-content:space-between;
    }
    .brand-logo{display:flex;align-items:center;gap:.7rem;text-decoration:none}
    .brand-icon{
      width:36px;height:36px;background:var(--blue);border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(37,99,235,.3);
    }
    .brand-icon svg{width:20px;height:20px}
    .brand-name{font-size:1.25rem;font-weight:700;color:var(--text);letter-spacing:-.025em}
    .brand-tag{font-size:.65rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .header-nav{display:flex;gap:.8rem;align-items:center}
    .nav-link{
      text-decoration:none;color:var(--muted);font-size:.8rem;font-weight:500;
      padding:.5rem .9rem;border-radius:6px;transition:all .2s;
    }
    .nav-link:hover{color:var(--text);background:var(--blue-light)}
    .nav-link.active{color:var(--blue);background:var(--blue-light)}

    /* Container */
    .container{max-width:920px;margin:0 auto;padding:0 1.5rem}

    /* Page header */
    .page-header{margin-bottom:2rem}
    .page-title{font-size:1.8rem;font-weight:800;color:var(--text);margin-bottom:.4rem;letter-spacing:-.03em}
    .page-subtitle{font-size:.92rem;color:var(--muted);line-height:1.6}

    /* Search & Filter */
    .controls{
      background:var(--white);border:1px solid var(--border);border-radius:12px;
      padding:1.3rem 1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow);
    }
    .search-box{position:relative;margin-bottom:1rem}
    .search-input{
      width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
      padding:.7rem 1rem .7rem 2.8rem;font-family:'Inter',sans-serif;font-size:.88rem;
      color:var(--text);outline:none;transition:all .2s;
    }
    .search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .search-icon{
      position:absolute;left:.95rem;top:50%;transform:translateY(-50%);
      color:var(--muted2);font-size:.9rem;pointer-events:none;
    }
    .filter-row{display:flex;gap:.7rem;flex-wrap:wrap}
    .filter-btn{
      background:var(--bg);border:1.5px solid var(--border);border-radius:6px;
      padding:.5rem 1rem;font-size:.78rem;font-weight:500;color:var(--muted);
      cursor:pointer;transition:all .2s;
    }
    .filter-btn:hover{border-color:var(--blue-mid);color:var(--text)}
    .filter-btn.active{background:var(--blue);border-color:var(--blue);color:var(--white)}

    /* Empty state */
    .empty-state{
      background:var(--white);border:1px solid var(--border);border-radius:12px;
      padding:3rem 2rem;text-align:center;box-shadow:var(--shadow);
    }
    .empty-icon{
      width:80px;height:80px;background:var(--blue-light);border-radius:50%;
      margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;
      font-size:2rem;
    }
    .empty-title{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:.5rem}
    .empty-desc{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
    .empty-btn{
      display:inline-flex;align-items:center;gap:.5rem;
      background:var(--blue);color:var(--white);border:none;border-radius:8px;
      padding:.8rem 1.8rem;font-size:.88rem;font-weight:600;cursor:pointer;
      text-decoration:none;transition:all .2s;
    }
    .empty-btn:hover{background:var(--blue-dark);transform:translateY(-1px)}

    /* Order cards */
    .orders-grid{display:grid;gap:1.2rem}
    .order-card{
      background:var(--white);border:1px solid var(--border);border-radius:12px;
      padding:1.5rem;box-shadow:var(--shadow);transition:all .2s;position:relative;
      overflow:hidden;
    }
    .order-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
    }
    .order-card.status-processing::before{background:linear-gradient(90deg,var(--blue),#6366f1)}
    .order-card.status-approved::before{background:linear-gradient(90deg,var(--success),#22c55e)}
    .order-card.status-declined::before{background:linear-gradient(90deg,var(--error),#ef4444)}
    .order-card.gpt::before{background:linear-gradient(90deg,var(--gpt),#0891b2)}
    .order-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}

    .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem}
    .order-main{}
    .product-name{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:.3rem}
    .order-id{
      font-family:'JetBrains Mono',monospace;font-size:.72rem;
      color:var(--muted2);letter-spacing:.02em;
    }
    .status-badge{
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.35rem .85rem;border-radius:99px;font-size:.7rem;font-weight:600;
    }
    .status-badge.processing{background:#eff6ff;border:1px solid #bfdbfe;color:var(--blue)}
    .status-badge.approved{background:var(--success-bg);border:1px solid var(--success-border);color:var(--success)}
    .status-badge.declined{background:var(--error-bg);border:1px solid var(--error-border);color:var(--error)}
    .status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}

    .order-details{
      background:var(--bg);border-radius:8px;padding:1rem;margin-bottom:1rem;
    }
    .detail-row{
      display:flex;justify-content:space-between;padding:.4rem 0;
      font-size:.8rem;border-bottom:1px solid var(--border);
    }
    .detail-row:last-child{border-bottom:none;padding-bottom:0}
    .detail-row:first-child{padding-top:0}
    .detail-label{color:var(--muted);font-weight:500}
    .detail-value{color:var(--text);font-weight:500;font-family:'JetBrains Mono',monospace;font-size:.75rem}

    /* Countdown timer */
    .countdown-widget{
      background:var(--blue-light);border:1px solid var(--blue-mid);
      border-radius:8px;padding:.9rem 1rem;margin-bottom:1rem;text-align:center;
    }
    .countdown-widget.expiring{background:var(--warn-bg);border-color:var(--warn-border)}
    .countdown-widget.expired{background:var(--error-bg);border-color:var(--error-border)}
    .countdown-label{
      font-size:.65rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.1em;margin-bottom:.5rem;
    }
    .countdown-widget .countdown-label{color:var(--blue)}
    .countdown-widget.expiring .countdown-label{color:var(--warn)}
    .countdown-widget.expired .countdown-label{color:var(--error)}
    .countdown-time{
      font-family:'JetBrains Mono',monospace;font-size:1.5rem;
      font-weight:700;margin-bottom:.3rem;
    }
    .countdown-widget .countdown-time{color:var(--blue-dark)}
    .countdown-widget.expiring .countdown-time{color:#b45309}
    .countdown-widget.expired .countdown-time{color:var(--error)}
    .countdown-date{font-size:.72rem;color:var(--muted)}

    .order-actions{display:flex;gap:.7rem;flex-wrap:wrap}
    .action-btn{
      flex:1;min-width:140px;background:var(--blue-light);border:1.5px solid var(--blue-mid);
      border-radius:8px;padding:.7rem 1.2rem;font-size:.8rem;font-weight:600;
      color:var(--blue);cursor:pointer;transition:all .2s;display:flex;
      align-items:center;justify-content:center;gap:.4rem;text-decoration:none;
    }
    .action-btn:hover{background:var(--blue);color:var(--white);border-color:var(--blue)}
    .action-btn.secondary{background:var(--white);border-color:var(--border);color:var(--muted)}
    .action-btn.secondary:hover{background:var(--bg);border-color:var(--muted2);color:var(--text)}

    /* Loading state */
    .loading-overlay{
      position:fixed;inset:0;background:rgba(255,255,255,.9);
      backdrop-filter:blur(8px);z-index:1000;
      display:flex;align-items:center;justify-content:center;
    }
    .loader{
      width:48px;height:48px;border:4px solid var(--blue-mid);
      border-top-color:var(--blue);border-radius:50%;
      animation:spin .8s linear infinite;
    }

    /* Animations */
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .order-card{animation:fadeIn .4s ease backwards}
    .order-card:nth-child(1){animation-delay:.05s}
    .order-card:nth-child(2){animation-delay:.1s}
    .order-card:nth-child(3){animation-delay:.15s}
    .order-card:nth-child(4){animation-delay:.2s}

    @media(max-width:600px){
      .header-nav{display:none}
      .page-title{font-size:1.5rem}
      .order-header{flex-direction:column;gap:.8rem}
      .filter-row{flex-direction:column}
      .filter-btn{width:100%}
      .order-actions{flex-direction:column}
      .action-btn{min-width:100%}
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <a href="/" class="brand-logo">
        <div class="brand-icon">
          <svg fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">DTC</div>
          <div class="brand-tag">Customer Portal</div>
        </div>
      </a>
      <div class="header-nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/customer" class="nav-link active">My Orders</a>
        <a href="/submit" class="nav-link">New Order</a>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">My Orders</h1>
      <p class="page-subtitle">Track and manage your DTC subscriptions and orders</p>
    </div>

    <!-- Search & Filter controls -->
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by Order ID, Email, or Token..."/>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All Orders</button>
        <button class="filter-btn" data-filter="processing">Processing</button>
        <button class="filter-btn" data-filter="approved">Active</button>
        <button class="filter-btn" data-filter="declined">Declined</button>
      </div>
    </div>

    <!-- Orders grid -->
    <div id="ordersContainer" class="orders-grid">
      <!-- Orders will be rendered here -->
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">📋</div>
      <h2 class="empty-title">No orders found</h2>
      <p class="empty-desc">Try adjusting your search or filters, or create a new order to get started.</p>
      <a href="/submit" class="empty-btn">
        <span>Create New Order</span>
        <span>→</span>
      </a>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none">
    <div class="loader"></div>
  </div>

  <script>
    let allOrders = [];
    let filteredOrders = [];
    let currentFilter = 'all';

    // Load orders on page load
    async function loadOrders() {
      const overlay = document.getElementById('loadingOverlay');
      overlay.style.display = 'flex';
      
      try {
        const response = await fetch('/api/customer/orders');
        if (!response.ok) throw new Error('Failed to load orders');
        
        const data = await response.json();
        allOrders = data.orders || [];
        filteredOrders = allOrders;
        
        renderOrders();
      } catch (error) {
        console.error('Error loading orders:', error);
        alert('Failed to load orders. Please try again.');
      } finally {
        overlay.style.display = 'none';
      }
    }

    // Render orders
    function renderOrders() {
      const container = document.getElementById('ordersContainer');
      const emptyState = document.getElementById('emptyState');
      
      if (filteredOrders.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }
      
      container.style.display = 'grid';
      emptyState.style.display = 'none';
      
      container.innerHTML = filteredOrders.map(order => {
        const isGPT = order.productId && order.productId.toLowerCase().includes('gpt');
        const statusClass = order.status || 'processing';
        const gptClass = isGPT ? 'gpt' : '';
        
        // Calculate countdown
        const expiresAt = order.expiresAt ? new Date(order.expiresAt) : null;
        const now = new Date();
        let countdownHTML = '';
        
        if (expiresAt && order.status === 'approved') {
          const diffMs = expiresAt - now;
          const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
          const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          
          let countdownClass = '';
          let countdownLabel = 'TIME REMAINING';
          let timeDisplay = '';
          
          if (diffMs <= 0) {
            countdownClass = 'expired';
            countdownLabel = 'SUBSCRIPTION EXPIRED';
            timeDisplay = 'Expired';
          } else if (diffDays <= 7) {
            countdownClass = 'expiring';
            countdownLabel = 'EXPIRING SOON';
            timeDisplay = `${diffDays}d ${diffHours}h`;
          } else {
            timeDisplay = `${diffDays} days`;
          }
          
          countdownHTML = `
            <div class="countdown-widget ${countdownClass}">
              <div class="countdown-label">${countdownLabel}</div>
              <div class="countdown-time">${timeDisplay}</div>
              <div class="countdown-date">Expires: ${expiresAt.toLocaleDateString()}</div>
            </div>
          `;
        }
        
        // Status badge
        const statusBadgeHTML = `
          <span class="status-badge ${statusClass}">
            ${statusClass !== 'declined' ? '<span class="status-dot"></span>' : ''}
            ${statusClass.charAt(0).toUpperCase() + statusClass.slice(1)}
          </span>
        `;
        
        // View link button
        const viewLinkBtn = order.activationLink ? 
          `<a href="/status/${order.activationToken}" class="action-btn">
            <span>📋</span>
            <span>View Status Page</span>
          </a>` : '';
        
        return `
          <div class="order-card status-${statusClass} ${gptClass}">
            <div class="order-header">
              <div class="order-main">
                <div class="product-name">${order.productName || 'Unknown Product'}</div>
                <div class="order-id">Order #${order.orderId}</div>
              </div>
              ${statusBadgeHTML}
            </div>
            
            ${countdownHTML}
            
            <div class="order-details">
              <div class="detail-row">
                <span class="detail-label">Package</span>
                <span class="detail-value">${order.packageName || 'N/A'}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value">${order.email}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Submitted</span>
                <span class="detail-value">${new Date(order.createdAt).toLocaleDateString()}</span>
              </div>
              ${order.activatedAt ? `
              <div class="detail-row">
                <span class="detail-label">Activated</span>
                <span class="detail-value">${new Date(order.activatedAt).toLocaleDateString()}</span>
              </div>
              ` : ''}
            </div>
            
            <div class="order-actions">
              ${viewLinkBtn}
              <button class="action-btn secondary" onclick="copyActivationLink('${order.activationToken}')">
                <span>📎</span>
                <span>Copy Link</span>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Filter orders
    function applyFilter(filter) {
      currentFilter = filter;
      
      // Update active filter button
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === filter) {
          btn.classList.add('active');
        }
      });
      
      // Filter orders
      if (filter === 'all') {
        filteredOrders = allOrders;
      } else {
        filteredOrders = allOrders.filter(order => order.status === filter);
      }
      
      // Apply search
      applySearch();
    }

    // Search orders
    function applySearch() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      
      if (!searchTerm) {
        if (currentFilter === 'all') {
          filteredOrders = allOrders;
        } else {
          filteredOrders = allOrders.filter(order => order.status === currentFilter);
        }
      } else {
        let orders = currentFilter === 'all' ? allOrders : allOrders.filter(order => order.status === currentFilter);
        filteredOrders = orders.filter(order => 
          order.orderId.toLowerCase().includes(searchTerm) ||
          order.email.toLowerCase().includes(searchTerm) ||
          (order.activationToken && order.activationToken.toLowerCase().includes(searchTerm)) ||
          (order.productName && order.productName.toLowerCase().includes(searchTerm))
        );
      }
      
      renderOrders();
    }

    // Copy activation link
    function copyActivationLink(token) {
      const link = `${window.location.origin}/status/${token}`;
      navigator.clipboard.writeText(link).then(() => {
        alert('Activation link copied to clipboard!');
      }).catch(() => {
        alert('Failed to copy link. Please try again.');
      });
    }

    // Event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
    });

    document.getElementById('searchInput').addEventListener('input', applySearch);

    // Initialize
    loadOrders();
  </script>
</body>
</html>
