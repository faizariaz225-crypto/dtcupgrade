<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DTC — Subscription Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--blue-light:#eff6ff;--blue-mid:#bfdbfe;--success:#16a34a;--warn:#d97706;--error:#dc2626;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--white:#fff;--bg:#f8fafc}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:480px;box-shadow:0 4px 24px rgba(37,99,235,.07)}
.logo{text-align:center;margin-bottom:1.8rem}
.logo-name{font-size:1.5rem;font-weight:800;color:var(--text);letter-spacing:-.025em}
.logo-sub{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:.1rem}
h2{font-size:1.1rem;font-weight:700;margin-bottom:.3rem}
.sub{font-size:.83rem;color:var(--muted);margin-bottom:1.5rem}
.input-wrap{display:flex;gap:.5rem;margin-bottom:1rem}
input[type=text]{flex:1;padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s}
input:focus{border-color:var(--blue)}
.btn{padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:var(--white);border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:.78rem;color:var(--error);margin-top:.4rem;display:none}
.err.show{display:block}
/* Status card */
.status-block{display:none}
.status-block.show{display:block}
.cust-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
.cust-name{font-size:1.1rem;font-weight:700}
.cust-pkg{font-size:.8rem;color:var(--muted);margin-top:.15rem}
.status-badge{padding:.3rem .85rem;border-radius:99px;font-size:.73rem;font-weight:700;white-space:nowrap}
.badge-active{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
.badge-expiring{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.badge-expired{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.badge-processing{background:#eff6ff;border:1px solid var(--blue-mid);color:var(--blue)}
.row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #f1f5f9;font-size:.83rem}
.row:last-child{border-bottom:none}
.row-label{color:var(--muted)}
.row-val{font-weight:600;text-align:right}
.bar-wrap{margin:1.2rem 0}
.bar-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:.4rem}
.bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.actions{display:flex;flex-direction:column;gap:.5rem;margin-top:1.4rem}
.links-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--border);font-size:.78rem}
.links-bar a{color:var(--blue);text-decoration:none}.links-bar a:hover{text-decoration:underline}
.links-bar span{color:var(--border)}
.footer{margin-top:2rem;font-size:.72rem;color:var(--muted);text-align:center}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-name">DTC</div>
    <div class="logo-sub">Digital Tools Corner</div>
  </div>

  <!-- Lookup form -->
  <div id="lookup-block">
    <h2>Subscription Status</h2>
    <p class="sub">Enter your activation token to check your subscription status.</p>
    <div class="input-wrap">
      <input type="text" id="token-input" placeholder="Paste your token here…" onkeydown="if(event.key==='Enter')lookup()"/>
      <button class="btn btn-primary" onclick="lookup()" id="lookup-btn">Check</button>
    </div>
    <div class="err" id="lookup-err"></div>
  </div>

  <!-- Status display -->
  <div class="status-block" id="status-block">
    <div class="cust-header">
      <div>
        <div class="cust-name" id="s-name"></div>
        <div class="cust-pkg" id="s-pkg"></div>
      </div>
      <span class="status-badge" id="s-badge"></span>
    </div>

    <div id="s-rows"></div>

    <div class="bar-wrap" id="s-bar-wrap" style="display:none">
      <div class="bar-label">
        <span>Subscription progress</span>
        <span id="s-pct"></span>
      </div>
      <div class="bar"><div class="bar-fill" id="s-bar" style="width:0%"></div></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="renew-btn" style="display:none" onclick="requestRenewal()">🔄 Request Renewal</button>
      <button class="btn btn-outline" onclick="resetLookup()">← Check another token</button>
    </div>
  </div>

  <div class="links-bar">
    <a href="/history">Subscription History</a>
    <span>·</span>
    <a href="/find-link">Find my activation link</a>
    <span>·</span>
    <a href="/">DTC Home</a>
  </div>
</div>

<div class="footer">DTC — Digital Tools Corner &nbsp;·&nbsp; dtc@dtc1.shop</div>

<script>
  const params = new URLSearchParams(location.search);
  let currentToken = params.get('token') || '';
  if (currentToken) { document.getElementById('token-input').value = currentToken; lookup(); }

  async function lookup() {
    const token = document.getElementById('token-input').value.trim();
    if (!token) return;
    currentToken = token;
    const btn = document.getElementById('lookup-btn');
    const err = document.getElementById('lookup-err');
    btn.disabled = true; btn.textContent = '…'; err.classList.remove('show');
    try {
      const r = await fetch(`/api/status?token=${encodeURIComponent(token)}`);
      const d = await r.json();
      btn.disabled = false; btn.textContent = 'Check';
      if (!r.ok || d.error) { err.textContent = d.error || 'Token not found.'; err.classList.add('show'); return; }
      showStatus(d, token);
    } catch {
      btn.disabled = false; btn.textContent = 'Check';
      err.textContent = 'Could not reach server.'; err.classList.add('show');
    }
  }

  function showStatus(d, token) {
    document.getElementById('lookup-block').style.display = 'none';
    document.getElementById('status-block').classList.add('show');

    document.getElementById('s-name').textContent = d.customerName || '—';
    document.getElementById('s-pkg').textContent  = d.packageType  || '—';

    // Badge
    const badge = document.getElementById('s-badge');
    const now = new Date();
    let badgeClass = 'badge-processing', badgeText = '⏳ Processing';
    if (d.status === 'activated') {
      const expiry = d.subscriptionExpiresAt ? new Date(d.subscriptionExpiresAt) : null;
      const daysLeft = expiry ? Math.ceil((expiry - now) / 86400000) : null;
      if (daysLeft !== null && daysLeft < 0)   { badgeClass = 'badge-expired';   badgeText = '✕ Expired'; }
      else if (daysLeft !== null && daysLeft <= 7)  { badgeClass = 'badge-expiring';  badgeText = `⚠ ${daysLeft}d left`; }
      else if (daysLeft !== null && daysLeft <= 30) { badgeClass = 'badge-expiring';  badgeText = `⏰ ${daysLeft}d left`; }
      else                                          { badgeClass = 'badge-active';    badgeText = '✓ Active'; }
    } else if (d.status === 'pending')   { badgeClass = 'badge-processing'; badgeText = '⏳ Pending'; }
    else if (d.status === 'declined')    { badgeClass = 'badge-expired';    badgeText = '✕ Declined'; }
    badge.className = 'status-badge ' + badgeClass;
    badge.textContent = badgeText;

    // Rows
    const fmt = (iso) => iso ? new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}) : '—';
    const rows = [];
    if (d.approvedAt)             rows.push(['Activated On', fmt(d.approvedAt)]);
    if (d.subscriptionExpiresAt)  rows.push(['Expires On',   fmt(d.subscriptionExpiresAt)]);
    if (d.country)                rows.push(['Country',       d.country]);
    if (d.wechat)                 rows.push(['WeChat',        d.wechat]);
    document.getElementById('s-rows').innerHTML = rows.map(([l,v]) =>
      `<div class="row"><span class="row-label">${l}</span><span class="row-val">${v}</span></div>`).join('');

    // Progress bar
    if (d.status === 'activated' && d.subscriptionExpiresAt && d.durationDays) {
      const expiry   = new Date(d.subscriptionExpiresAt);
      const start    = new Date(expiry - d.durationDays * 86400000);
      const total    = d.durationDays * 86400000;
      const used     = Math.max(0, now - start);
      const pct      = Math.min(100, Math.round(used / total * 100));
      const daysLeft = Math.max(0, Math.ceil((expiry - now) / 86400000));
      const color    = daysLeft <= 0 ? '#dc2626' : daysLeft <= 7 ? '#d97706' : '#16a34a';
      document.getElementById('s-bar-wrap').style.display = '';
      document.getElementById('s-bar').style.width        = pct + '%';
      document.getElementById('s-bar').style.background   = color;
      document.getElementById('s-pct').textContent        = pct + '% used';
    }

    // Renew button — show if activated (even if expired)
    const renewBtn = document.getElementById('renew-btn');
    if (d.status === 'activated') renewBtn.style.display = '';
    renewBtn.dataset.token = token;
  }

  async function requestRenewal() {
    const btn = document.getElementById('renew-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const r = await fetch('/api/request-renewal', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: currentToken }) });
      const d = await r.json();
      if (d.success) {
        btn.textContent = '✓ Renewal request sent!';
        btn.style.background = '#16a34a';
        setTimeout(() => { btn.disabled = false; btn.textContent = '🔄 Request Renewal'; btn.style.background = ''; }, 4000);
      } else {
        btn.disabled = false; btn.textContent = '🔄 Request Renewal';
        alert(d.error || 'Could not send renewal request.');
      }
    } catch {
      btn.disabled = false; btn.textContent = '🔄 Request Renewal';
      alert('Could not reach server.');
    }
  }

  function resetLookup() {
    document.getElementById('lookup-block').style.display = '';
    document.getElementById('status-block').classList.remove('show');
    document.getElementById('token-input').value = '';
    document.getElementById('lookup-err').classList.remove('show');
    document.getElementById('s-bar-wrap').style.display = 'none';
    document.getElementById('renew-btn').style.display = 'none';
    document.getElementById('renew-btn').style.background = '';
  }
</script>
</body>
</html>
